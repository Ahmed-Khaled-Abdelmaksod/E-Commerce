<section class="featured-section">
    <div class="container">
        <div class="featured-header">
            <div>
                <span class="section-subtitle">Our Bestsellers</span>
                <h2 class="fw-bold section-title mb-0" style="margin-bottom: 0;">Popular Treats</h2>
            </div>
            <a href="${pageContext.request.contextPath}/products" class="view-all-link d-none d-md-flex align-items-center">
                View all <i class="bi bi-arrow-right ms-2"></i>
            </a>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4">
            <div class="col">
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <span class="product-badge">Cupcakes</span>
                        <img src="https://images.unsplash.com/photo-1576618148400-f54bed99fcfd?q=80&w=500&auto=format&fit=crop" alt="Strawberry Cupcake" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">Strawberry Cupcake</h3>
                        <div class="product-footer">
                            <p class="product-price">$4.99</p>
                            <button class="btn-add">
                                <i class="bi bi-cart3"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <span class="product-badge">Macarons</span>
                        <img src="https://images.unsplash.com/photo-1569864358642-9d1684040f43?q=80&w=500&auto=format&fit=crop" alt="French Macarons" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">French Macarons</h3>
                        <div class="product-footer">
                            <p class="product-price">$12.99</p>
                            <button class="btn-add">
                                <i class="bi bi-cart3"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <span class="product-badge">Cakes</span>
                        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=500&auto=format&fit=crop" alt="Chocolate Cake" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">Chocolate Cake</h3>
                        <div class="product-footer">
                            <p class="product-price">$24.99</p>
                            <button class="btn-add">
                                <i class="bi bi-cart3"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <span class="product-badge">Cookies</span>
                        <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?q=80&w=500&auto=format&fit=crop" alt="Chocolate Chip Cookies" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">Chocolate Chip Cookies</h3>
                        <div class="product-footer">
                            <p class="product-price">$8.99</p>
                            <button class="btn-add">
                                <i class="bi bi-cart3"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4 text-center d-md-none">
            <a href="${pageContext.request.contextPath}/products" class="view-all-link">
                View all <i class="bi bi-arrow-right ms-2"></i>
            </a>
        </div>
    </div>
</section>

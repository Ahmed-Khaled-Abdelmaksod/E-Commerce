<section class="profile-section">
    <div class="container" style="max-width: 1000px;">

        <div class="profile-header">
            <h1 class="profile-title">My Profile</h1>
            <button class="btn-edit-profile">
                <i class="bi bi-pencil"></i> Edit Profile
            </button>
        </div>

        <div class="row g-4">

            <div class="col-lg-6">
                <div class="profile-card">
                    <h2 class="profile-card-title">Personal Information</h2>

                    <div class="info-list">
                        <div class="info-item">
                            <i class="bi bi-person info-icon"></i>
                            <div class="info-content">
                                <span class="info-label">Full Name</span>
                                <p class="info-value">Demo User</p>
                            </div>
                        </div>

                        <div class="info-item">
                            <i class="bi bi-envelope info-icon"></i>
                            <div class="info-content">
                                <span class="info-label">Email</span>
                                <p class="info-value">demo@sweetdelights.com</p>
                            </div>
                        </div>

                        <div class="info-item">
                            <i class="bi bi-calendar3 info-icon"></i>
                            <div class="info-content">
                                <span class="info-label">Birthday</span>
                                <p class="info-value">1990-01-15</p>
                            </div>
                        </div>

                        <div class="info-item">
                            <i class="bi bi-telephone info-icon"></i>
                            <div class="info-content">
                                <span class="info-label">Phone</span>
                                <p class="info-value">+1 (555) 123-4567</p>
                            </div>
                        </div>

                        <div class="info-item">
                            <i class="bi bi-geo-alt info-icon"></i>
                            <div class="info-content">
                                <span class="info-label">Address</span>
                                <p class="info-value">123 Sweet Street, Candy City</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 d-flex flex-column gap-4">

                <div class="profile-card" style="height: auto;">
                    <h2 class="profile-card-title">
                        <i class="bi bi-credit-card" style="color: var(--primary);"></i> Credit Limit
                    </h2>
                    <p class="credit-amount">$500.00</p>
                    <p class="credit-desc">Available balance for purchases</p>
                </div>

                <div class="profile-card" style="height: auto; flex-grow: 1;">
                    <h2 class="profile-card-title">Order History</h2>
                    <p class="empty-state-text">No orders yet</p>
                </div>

            </div>

        </div>
    </div>
</section>

<header class="navbar navbar-expand-md sticky-top bg-card-glass border-bottom px-lg-4">
    <div class="container-fluid max-w-7xl d-flex align-items-center">

        <a class="navbar-brand d-flex align-items-center gap-2" href="${pageContext.request.contextPath}/home">
            <div class="brand-logo-circle">
                <span class="font-serif">S</span>
            </div>
            <span class="brand-text font-serif fw-bold h4 mb-0">Sweet Delights</span>
        </a>

        <div class="collapse navbar-collapse justify-content-center order-3 order-md-2" id="navbarNav">
            <ul class="navbar-nav gap-md-4 py-3 py-md-0 text-center text-md-start">
                <li class="nav-item">
                    <a class="nav-link text-muted hover-dark font-medium small" href="${pageContext.request.contextPath}/home">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-muted hover-dark font-medium small" href="${pageContext.request.contextPath}/products">Shop</a>
                </li>
            </ul>
        </div>

        <div class="d-flex align-items-center gap-2 ms-auto order-2 order-md-3">
            <a href="${pageContext.request.contextPath}/cart" class="btn btn-icon position-relative">
                <i class="bi bi-cart3 fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      id="guest-cart-badge"
                      style="font-size: 0.65em; display: none;">
                    0
                </span>
            </a>
            
            <div class="dropdown d-none d-md-block">
                <a href="#" class="btn btn-icon" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person fs-5"></i>
                    <span class="visually-hidden">Account</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                    <li><a class="dropdown-item py-2 fw-medium small" href="${pageContext.request.contextPath}/auth/login">Sign In</a></li>
                    <li><a class="dropdown-item py-2 fw-medium small" href="${pageContext.request.contextPath}/auth/register">Create Account</a></li>
                </ul>
            </div>
            
            <!-- Mobile Account Links (shown when toggle is open) -->
            <a href="${pageContext.request.contextPath}/auth/login" class="btn btn-icon d-md-none">
                <i class="bi bi-person fs-5"></i>
            </a>

            <button class="navbar-toggler btn-icon border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-4"></i>
            </button>
        </div>

    </div>
</header>
